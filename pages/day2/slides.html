<link rel="stylesheet" href="../../styles/style.css">
<style>
  body { background: var(--ink); overflow: hidden; }
  .deck { position: relative; width: 100vw; height: 100vh; }
  .slide {
    position: absolute; inset: 0;
    display: none;
    flex-direction: column;
    justify-content: center;
    padding: 6vh 9vw;
    color: var(--paper);
  }
  .slide.active { display: flex; }
  .slide .eyebrow { margin-bottom: 10px; }
  .slide h1 { font-size: 46px; margin: 0 0 20px; line-height: 1.1; max-width: 22ch; }
  .slide h2.sub { font-size: 22px; font-weight: 500; color: rgba(255,255,255,0.65); margin: -10px 0 24px; font-family: var(--font-body); }
  .slide ul { font-size: 24px; line-height: 1.65; max-width: 30ch; padding-left: 26px; }
  .slide ul li::marker { color: var(--led-amber); }
  .two-col { display: grid; grid-template-columns: 1.1fr 1fr; gap: 48px; align-items: center; }
  .card-dark {
    background: var(--ink-soft);
    border: 1px solid var(--line-dark);
    border-radius: 16px;
    padding: 24px 26px;
  }
  .card-dark h3 { margin-top: 0; font-size: 15px; color: var(--led-amber); letter-spacing: .03em; }
  pre { font-size: 15.5px; }
  .pins { display: flex; gap: 8px; flex-wrap: wrap; margin-top: 14px; }
  .rail-wrap { position: absolute; bottom: 0; left: 0; right: 0; }
  .progress { position: fixed; top: 0; left: 0; height: 4px; background: var(--circuit-teal); transition: width .2s; z-index: 5; }
  .nav-hint {
    position: fixed; bottom: 20px; right: 28px;
    font-family: var(--font-mono); font-size: 12px; color: rgba(255,255,255,0.4);
  }
  .count { position: fixed; bottom: 20px; left: 28px; font-family: var(--font-mono); font-size: 12px; color: rgba(255,255,255,0.4); }
  .tag { position: fixed; top: 18px; right: 28px; font-family: var(--font-mono); font-size: 12px; padding: 4px 10px; border-radius: 999px; border: 1px solid rgba(255,255,255,0.25); color: rgba(255,255,255,0.6); }
  .big-num { font-family: var(--font-display); font-size: 100px; color: var(--led-amber); line-height: 1; }
  .checklist li { list-style: none; margin-left: -26px; }
  .checklist li::before { content: "→ "; color: var(--circuit-teal); }
</style>
</head>

<script>
const data = JSON.parse(document.getElementById('slide-data').textContent);
const deck = document.getElementById('deck');
data.forEach((s, i) => {
  const el = document.createElement('div');
  el.className = 'slide' + (i === 0 ? ' active' : '');
  el.innerHTML = s.html + "<div class='rail-wrap'><div class='rail on-dark'></div></div>";
  deck.appendChild(el);
});
let idx = 0;
const slides = document.querySelectorAll('.slide');
const progress = document.getElementById('progress');
const count = document.getElementById('count');
const tag = document.getElementById('tag');
function render() {
  slides.forEach((s, i) => s.classList.toggle('active', i === idx));
  progress.style.width = ((idx + 1) / slides.length * 100) + '%';
  count.textContent = (idx + 1) + ' / ' + slides.length;
  tag.textContent = 'DAY 2 · ' + data[idx].session + ' SESSION';
}
function next() { idx = Math.min(idx + 1, slides.length - 1); render(); }
function prev() { idx = Math.max(idx - 1, 0); render(); }
document.addEventListener('keydown', e => {
  if (['ArrowRight', ' ', 'PageDown'].includes(e.key)) next();
  if (['ArrowLeft', 'PageUp'].includes(e.key)) prev();
});
document.addEventListener('click', e => { if (e.clientX > window.innerWidth / 2) next(); else prev(); });
render();
</script>
