<svg viewBox="0 0 500 220" xmlns="http://www.w3.org/2000/svg" width="100%" style="max-width:500px;display:block">
  <rect x="10" y="30" width="300" height="160" rx="10" fill="#F1ECDF" stroke="#3A4150" stroke-width="1.5"/>
  <text x="30" y="55" font-size="11" font-family="JetBrains Mono, monospace" fill="#3A4150">Raspberry Pi board</text>

  <!-- CSI port -->
  <rect x="120" y="70" width="70" height="16" rx="2" fill="#3A4150"/>
  <text x="95" y="65" font-size="10" font-family="JetBrains Mono, monospace" fill="#3A4150">CSI camera port</text>
  <rect x="126" y="72" width="58" height="12" fill="#FBF7EE"/>

  <!-- locking tab -->
  <rect x="120" y="86" width="70" height="6" fill="#E4D9B8" stroke="#3A4150" stroke-width="1"/>
  <text x="195" y="94" font-size="9.5" font-family="JetBrains Mono, monospace" fill="#3A4150">locking tab</text>

  <!-- ribbon cable -->
  <path d="M155 70 C 155 30, 350 30, 350 60" stroke="#2FB8AC" stroke-width="10" fill="none" stroke-linecap="round"/>
  <text x="330" y="45" font-size="10" font-family="JetBrains Mono, monospace" fill="#1F8378">ribbon cable</text>

  <!-- camera module -->
  <rect x="330" y="60" width="80" height="80" rx="8" fill="#DCE9E7" stroke="#3A4150" stroke-width="1.5"/>
  <circle cx="370" cy="100" r="20" fill="#171B26"/>
  <circle cx="370" cy="100" r="10" fill="#3A4150"/>
  <text x="330" y="158" font-size="11" font-family="JetBrains Mono, monospace" fill="#171B26">camera module</text>

  <text x="30" y="175" font-size="10.5" font-family="JetBrains Mono, monospace" fill="#1F8378">Pi 3B+: silver contacts face the HDMI port,</text>
  <text x="30" y="190" font-size="10.5" font-family="JetBrains Mono, monospace" fill="#1F8378">blue tab faces the USB/Ethernet side.</text>
</svg>
